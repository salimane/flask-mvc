version: '3.8'
services:
  web:
    build: .
    ports:
      - "16000:16000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_ENV=${FLASK_ENV:-production}
    env_file:
      - .env
    depends_on:
      - postgres

  postgres:
    image: postgres:15.2-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: flask_dev
      POSTGRES_USER: flask
      POSTGRES_PASSWORD: flask
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
